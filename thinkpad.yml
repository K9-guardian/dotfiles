- hosts: localhost
  connection: local
  vars:
    kitty_extra_config: "files/thinkpad/kitty/"
    neovim_extra_config: "files/thinkpad/neovim/"
  roles:
    - { role: common, tags: always }
    - { role: bash,   tags: bash   }
    - { role: fzf,    tags: fzf    }
    - { role: cargo,  tags: cargo  }
    - { role: kitty,  tags: kitty  }
    - { role: neovim, tags: neovim }
    - { role: croc,   tags: croc   }
    - { role: rclone, tags: rclone }
