- name: Install latex
  ansible.builtin.dnf:
    name: texlive-scheme-full
    state: latest
  become: true

- name: Copy latexindent config
  template:
    src: "dot-indentconfig.yaml.j2"
    dest: "{{ ansible_facts.user_dir }}/.indentconfig.yaml"
    mode: '644'

- name: Stow latex configuration
  ansible.builtin.command:
    cmd: >
      {{ ansible_facts.user_dir }}/.local/bin/stow --dotfiles --no-folding {{ stow_args }}
      --dir={{ role_path }}/files
      --target={{ ansible_facts.user_dir }}
      config
  changed_when: false
